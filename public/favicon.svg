<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img" aria-label="Dungeons &amp; Typing — a gold d20">
  <defs>
    <!-- "Bright brown" background: a warm, lit centre falling off to a deeper
         edge so the gold die reads as a gem on leather, not a flat swatch. -->
    <radialGradient id="bg" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#8a6528"/>
      <stop offset="60%" stop-color="#6e4e1c"/>
      <stop offset="100%" stop-color="#4a3514"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square app-icon plate. -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="97" height="97" rx="20.5" fill="none" stroke="#e8c766" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- The d20 (gold variant), silhouette + face fills traced 1:1 from
       src/ui/common/Die.tsx, scaled to ~78% and centred so the brown plate
       frames it. -->
  <g transform="translate(50 50) scale(0.78) translate(-50 -50)">
    <polygon points="61.09,8.28 12.19,18.99 48.93,7.59" fill="#9b7d1e" stroke="#9b7d1e" stroke-width="0.4"/>
    <polygon points="51.07,92.41 38.91,91.72 6.00,70.98" fill="#3c310c" stroke="#3c310c" stroke-width="0.4"/>
    <polygon points="94.00,29.02 85.11,53.66 87.81,81.01" fill="#3c310c" stroke="#3c310c" stroke-width="0.4"/>
    <polygon points="94.00,29.02 61.09,8.28 85.11,53.66" fill="#6a5515" stroke="#6a5515" stroke-width="0.4"/>
    <polygon points="51.07,92.41 85.11,53.66 87.81,81.01" fill="#3c310c" stroke="#3c310c" stroke-width="0.4"/>
    <polygon points="34.55,47.46 12.19,18.99 6.00,70.98" fill="#a98821" stroke="#a98821" stroke-width="0.4"/>
    <polygon points="34.55,47.46 61.09,8.28 12.19,18.99" fill="#c8a127" stroke="#c8a127" stroke-width="0.4"/>
    <polygon points="34.55,47.46 51.07,92.41 6.00,70.98" fill="#786017" stroke="#786017" stroke-width="0.4"/>
    <polygon points="34.55,47.46 61.09,8.28 85.11,53.66" fill="#aa8921" stroke="#aa8921" stroke-width="0.4"/>
    <polygon points="34.55,47.46 51.07,92.41 85.11,53.66" fill="#786117" stroke="#786117" stroke-width="0.4"/>

    <polygon points="6.00,70.98 12.19,18.99 48.93,7.59 61.09,8.28 94.00,29.02 87.81,81.01 51.07,92.41 38.91,91.72"
             fill="none" stroke="#e8c766" stroke-width="2.6" stroke-linejoin="round"/>
  </g>
</svg>
